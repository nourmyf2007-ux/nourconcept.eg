body{

	overflow-x:hidden;

.hero{

}

.button{
display:inline-block;
padding:16px 40px;
background:#1F3A2E;
color:white;
text-decoration: inherit;
border-radius:50px;
font-size:18px;
transition:.3s;
}

.button:hover{
transform:translateY(-3px);
}

.about{
padding:100px 10%;
background:white;
text-align:center;
}

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:15px;
}

.card p{
line-height:1.6;
}

.story{
padding:100px 10%;
background:white;
text-align:center;
}

.story h2{
font-size:45px;
margin-bottom:25px;
}

.story p{
max-width:900px;
margin:auto;
line-height:1.9;
font-size:18px;
}

.countdown{
padding:100px 10%;
text-align:center;
background:#1F3A2E;
color:white;
}

.countdown h2{
font-size:50px;
margin-bottom:20px;
}

.countdown p{
font-size:20px;
}

.footer{
padding:40px;
text-align:center;
background:#163126;
color:white;
}

.footer h3{
margin-bottom:10px;
font-size:30px;
}

.footer p{

}

.logo{

}
